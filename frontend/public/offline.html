<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <title>Finance AI - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f8fafc;
        color: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 28px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
      }
      .icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #10b981;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 24px;
      }
      h1 { font-size: 20px; font-weight: 600; color: #0f172a; margin-bottom: 12px; }
      p { font-size: 15px; color: #64748b; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#x26A1;</div>
      <h1>Você está offline</h1>
      <p>Verifique sua conexão para acessar seus dados financeiros e tente novamente.</p>
    </div>
  </body>
</html>
